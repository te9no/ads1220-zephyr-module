description: |
  ADC based analog axis input device (high-resolution version)

  Implement an input device generating absolute axis events by periodically
  reading from some ADC channels. This version uses int32_t buffer for
  high-resolution ADCs (16-bit+).

  Example configuration:

  #include <zephyr/dt-bindings/input/input-event-codes.h>

  analog_axis_hires {
          compatible = "analog-axis-hires";
          poll-period-ms = <15>;
          axis-x {
                  io-channels = <&adc 0>;
                  in-deadzone = <50>;
                  in-min = <100>;
                  in-max = <800>;
                  zephyr,axis = <INPUT_ABS_X>;
          };
  };

compatible: "analog-axis-hires"

include: base.yaml

properties:
  poll-period-ms:
    type: int
    default: 15
    description: |
      How often to get new ADC samples for the various configured axes in
      milliseconds. Defaults to 15ms if unspecified.

  poll-period-downshift-ms:
    type: array
    description: |
      If this property is present, poll-period-ms is ignored and the first element
      is used as the polling interval instead. Must be an array with an odd
      number of elements in the format [poll-period, downshift-time,
      downshift-period, ...]. Once the axis stays idle for downshift-time,
      the polling rate switches to downshift-period to conserve power.
      Example: <8 5000 15 9000 100 11000 1300> polls at 8ms on init, then after
      5000ms idle switches to 15ms, then after 9000ms more idle switches to 100ms,
      then after 11000ms more idle switches to 1300ms.

  poll-period-en-gpios:
    type: phandle-array
    description: |
      This property only active, if poll-period-downshift-ms is presented.
      GPIO pin to enable the analog power supply.
      Pin is driven high while polling is active.

child-binding:
  properties:
    io-channels:
      type: phandle-array
      required: true
      description: |
        ADC IO channel to use.

    avdd-gpios:
      type: phandle-array
      description: |
        GPIO pin controlling the analog power supply.
        Pin is driven high while sampling this ADC channel.
        Use for multiplexing voltage reference across multiple channels.

    out-min:
      type: int
      default: 0
      description: |
        Minimum value to output on input events. Defaults to 0 if unspecified.

    out-max:
      type: int
      default: 255
      description: |
        Maximum value to output on input events. Defaults to 255 if
        unspecified.

    in-deadzone:
      type: int
      default: 0
      description: |
        Deadzone for the input center value. If specified input values between
        the center of the range plus or minus this value will be reported as
        center. Defaults to 0, no deadzone.

    in-min:
      type: int
      required: true
      description: |
        Input value that corresponds to the minimum output value.

    in-max:
      type: int
      required: true
      description: |
        Input value that corresponds to the maximum output value.

    zephyr,axis-type:
      type: int
      required: true
      description: |
        The input type for the axis to report for the device, typically any of
        INPUT_EV_*.

    zephyr,axis:
      type: int
      required: true
      description: |
        The input code for the axis to report for the device, typically any of
        INPUT_ABS_* or INPUT_REL_*.

    invert-input:
      type: boolean
      description: |
        If set, invert the raw ADC value before processing it. Useful for
        differential channels.

    invert-output:
      type: boolean
      description: |
        If set, invert the output value.

    skip-change-comparator:
      type: boolean
      description: |
        Skip the change comparator and report all sampled values.
        By default, only reports values that differ from the previous reading.

    in-calib-cycle:
      type: int
      description: |
        Number of samples to collect for auto-calibration.
        When set, captures the floating neutral values over this many samples.
        The DT-specified in-min and in-max define the full range; calibrated
        min/max will be shifted to align with the average of the neutral values.

    in-deadzone-calib-scale-pctg:
      type: int
      description: |
        Percentage of calibration range to use as deadzone.
        Scales the measured min-max range from calibration to set the deadzone.
        Use to filter noise/extreme samples during calibration.
